<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - Noxel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Reset margin & padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; /* Mencegah munculnya scrollbar */
        }

        /* Container Video Background */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -2;
            background-color: #000; /* Warna cadangan sebelum video termuat */
        }

        .video-container video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover; /* Memastikan video menutupi seluruh layar */
        }

        /* Lapisan Gelap (Overlay) agar teks lebih terbaca dengan jelas */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Transparansi hitam 60% */
            z-index: -1;
        }

        /* Tata Letak Konten Teks & Tombol */
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: #ffffff;
            padding: 0 20px;
        }

        .content h1 {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            opacity: 0;
            /* Animasi masuk delay 0.5 detik, lalu animasi menghilang di detik ke-17 */
            animation: fadeInUp 1s ease forwards 0.5s, fadeOut 0.5s ease forwards 17s; 
        }

        .content p {
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 8px;
            margin-bottom: 40px;
            opacity: 0;
            /* Animasi masuk delay 1 detik, lalu animasi menghilang di detik ke-17 */
            animation: fadeInUp 1s ease forwards 1s, fadeOut 0.5s ease forwards 17s;
        }

        .btn-follow {
            text-decoration: none;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 30px;
            transition: background 0.3s ease, color 0.3s ease;
            opacity: 0;
            /* Animasi masuk delay 1.5 detik, lalu mulai bergetar (shake) di detik ke-17.5 secara terus menerus */
            animation: fadeInUp 1s ease forwards 1.5s, shake 0.5s linear infinite 17.5s;
        }

        /* Efek saat tombol disentuh/kursor diarahkan */
        .btn-follow:hover {
            background: #ffffff;
            color: #000000;
        }

        /* Keyframes untuk Animasi Melayang ke Atas (Fade In Up) */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Keyframes untuk Menghilangkan Teks */
        @keyframes fadeOut {
            0% {
                opacity: 1;
                visibility: visible;
            }
            100% {
                opacity: 0;
                visibility: hidden;
                margin: 0;
                height: 0;
                padding: 0;
                display: none;
            }
        }

        /* Keyframes untuk Efek Shaking (Bergetar/Mengajak) pada Button */
        @keyframes shake {
            0% { transform: translateX(0); }
            20% { transform: translateX(-8px) rotate(-3deg); }
            40% { transform: translateX(6px) rotate(3deg); }
            60% { transform: translateX(-5px) rotate(-2deg); }
            80% { transform: translateX(4px) rotate(2deg); }
            100% { transform: translateX(0); }
        }

        /* ----- PENGATURAN RESPONSIF (MOBILE) ----- */
        @media (max-width: 768px) {
            .content h1 {
                font-size: 3.5rem;
                letter-spacing: 3px;
            }
            .content p {
                font-size: 1.2rem;
                letter-spacing: 5px;
            }
            .btn-follow {
                padding: 12px 35px;
                font-size: 1.1rem;
            }
        }

        @media (max-width: 480px) {
            .content h1 {
                font-size: 2.5rem;
                letter-spacing: 2px;
            }
            .content p {
                font-size: 0.9rem;
                letter-spacing: 4px;
                margin-bottom: 30px;
            }
            .btn-follow {
                padding: 10px 28px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay loop muted playsinline>
            <source src="https://github.com/noxel-id/Coming-Soon-Web/raw/refs/heads/main/video%20(2).mp4" type="video/mp4">
            Video tidak didukung di browser ini.
        </video>
    </div>

    <div class="overlay"></div>

    <div class="content">
        <h1>COMING SOON</h1>
        <p>DARE TO DREAM.</p>
        <a href="https://instagram.com/noxel.id" target="_blank" class="btn-follow">Follow</a>
    </div>

</body>
</html>
