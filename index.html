<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - Noxel</title>
    <!-- Menggunakan font Google Montserrat agar terlihat modern dan elegan -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Reset margin & padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; /* Mencegah munculnya scrollbar */
        }

        /* Container Video Background */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -2;
            background-color: #000;
        }

        .video-container video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        /* Lapisan Gelap (Overlay) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65); /* Sedikit digelapkan agar teks panjang lebih terbaca */
            z-index: -1;
        }

        /* Tata Letak Konten Teks & Tombol */
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: #ffffff;
            padding: 0 20px;
        }

        .content h1 {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 0.5s, fadeOut 0.5s ease forwards 17s; 
        }

        .tagline {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 8px;
            margin-bottom: 15px; /* Jarak diperkecil karena ada teks di bawahnya */
            opacity: 0;
            animation: fadeInUp 1s ease forwards 1s, fadeOut 0.5s ease forwards 17s;
        }

        /* Styling untuk teks keterangan tambahan */
        .description {
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.6;
            letter-spacing: 1.5px;
            max-width: 600px; /* Membatasi lebar teks agar rapi di desktop */
            margin-bottom: 40px;
            opacity: 0;
            /* Delay masuk 1.5s agar muncul setelah tagline */
            animation: fadeInUp 1s ease forwards 1.5s, fadeOut 0.5s ease forwards 17s;
        }

        .btn-follow {
            text-decoration: none;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 30px;
            transition: background 0.3s ease, color 0.3s ease;
            opacity: 0;
            /* Delay masuk 2s, mulai getar di 17.5s */
            animation: fadeInUp 1s ease forwards 2s, shake 0.5s linear infinite 17.5s;
        }

        .btn-follow:hover {
            background: #ffffff;
            color: #000000;
        }

        /* Keyframes Animations */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
                visibility: visible;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                visibility: hidden;
                transform: translateY(-20px); /* Efek menghilang perlahan ke atas */
                margin: 0;
                height: 0;
                padding: 0;
                display: none;
            }
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            20% { transform: translateX(-8px) rotate(-3deg); }
            40% { transform: translateX(6px) rotate(3deg); }
            60% { transform: translateX(-5px) rotate(-2deg); }
            80% { transform: translateX(4px) rotate(2deg); }
            100% { transform: translateX(0); }
        }

        /* ----- PENGATURAN RESPONSIF (MOBILE) ----- */
        @media (max-width: 768px) {
            .content h1 {
                font-size: 3.5rem;
                letter-spacing: 3px;
            }
            .tagline {
                font-size: 1.2rem;
                letter-spacing: 5px;
            }
            .description {
                font-size: 0.95rem;
                padding: 0 10px;
            }
            .btn-follow {
                padding: 12px 35px;
                font-size: 1.1rem;
            }
        }

        @media (max-width: 480px) {
            .content h1 {
                font-size: 2.5rem;
                letter-spacing: 2px;
            }
            .tagline {
                font-size: 0.9rem;
                letter-spacing: 4px;
                margin-bottom: 10px;
            }
            .description {
                font-size: 0.85rem;
                letter-spacing: 1px;
                margin-bottom: 30px;
            }
            .btn-follow {
                padding: 10px 28px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Video Background -->
    <div class="video-container">
        <video autoplay loop muted playsinline>
            <source src="https://github.com/noxel-id/Coming-Soon-Web/raw/refs/heads/main/11111%20(1).mp4" type="video/mp4">
            Video tidak didukung di browser ini.
        </video>
    </div>

    <!-- Lapisan Overlay Gelap -->
    <div class="overlay"></div>

    <!-- Konten Teks dan Tombol -->
    <div class="content">
        <h1>COMING SOON</h1>
        <p class="tagline">DARE TO DREAM.</p>
        <p class="description">Website sedang dalam tahap pengembangan. Nantinya untuk update katalog bisa cek di web ini serta marketplace Shopee dan Tokopedia.</p>
        <a href="https://instagram.com/noxel.id" target="_blank" class="btn-follow">Follow</a>
    </div>

</body>
</html>
